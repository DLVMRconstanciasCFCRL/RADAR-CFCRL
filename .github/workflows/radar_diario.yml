name: Radar CFCRL Diario

on:
  schedule:
    # 10:07 a.m. Ciudad de México
    - cron: "7 10 * * *"
      timezone: "America/Mexico_City"
    # Respaldo diario a las 10:45 a.m. Ciudad de México
    - cron: "45 10 * * *"
      timezone: "America/Mexico_City"
  workflow_dispatch:

jobs:
  ejecutar-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Ejecutar radar
        env:
          CORREO_REMITENTE: ${{ secrets.CORREO_REMITENTE }}
          PASSWORD_CORREO: ${{ secrets.PASSWORD_CORREO }}
          CORREO_DESTINATARIO: ${{ secrets.CORREO_DESTINATARIO }}
        run: |
          python src/radar_cfcrl.py
